server.port=8000
# server.servlet.contextPath=/api

# --- OPENAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# TODO: Configure with your own properties
# --- DATABASE ---
spring.datasource.url=jdbc:h2:mem:${artifactId}db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=
spring.jpa.properties.hibernate.format_sql=true

# --- ENVERS ---
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_audit
spring.jpa.properties.org.hibernate.envers.revision_field_name=revision_id
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revision_type
spring.jpa.properties.hibernate.integration.envers.enabled=true

# --- OAUTH ---
# NOTE: Remove if not using an external IDP
spring.security.oauth2.resourceserver.jwt.issuer-uri=
